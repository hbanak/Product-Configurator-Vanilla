<!DOCTYPE html>
<html>
    <head profile="http://www.w3.org/1999/xhtml/vocab">
        <style>
            * {
                -webkit-box-sizing: border-box;
                -moz-box-sizing: border-box;
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                border: 0 solid;
            }

            html {
                font-family: sans-serif;
                font-size: 62.5%;
                overflow-x: hidden;
                overflow-y: visible;
                -webkit-tap-highlight-color: rgba(0,0,0,0);
                -ms-text-size-adjust: 100%;
                -webkit-text-size-adjust: 100%;
                line-height: 1.5;
                tab-size: 4;
            }

            body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", "Open Sans", sans-serif;
                font-size: 1.6rem;
                font-weight: 500;
                line-height: 1.42857143;
                color: #333333;
                background-color: #ffffff;
                position: relative;
                float: left;
                left: 0;
                overflow: visible;
                width: 100%;
                -webkit-transition: left ease-in-out .3s;
                transition: left ease-in-out .3s;
            }

            html, body { min-height: 100vh; width: 100%; }

            footer, header, main { display: block; }

            header {
                background: #1b1f31;
                padding: 20px;
                min-height: 100px;
                width: 100%;
            }

            footer {
                bottom: 0;
                clear: both;
                overflow-x: hidden;
                position: absolute;
                width: 100%;
            }

            .footer_top { background: #4d4d4d; min-height: 60px; width: 100%; }
            .footer_bottom { background: #ededed; min-height: 300px; width: 100%; }

            hr {
                -moz-box-sizing: content-box;
                box-sizing: content-box;
                height: 0;
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #eeeeee;
            }

            button, input, select, textarea {
                color: inherit;
                font: inherit;
                font-family: inherit;
                font-size: inherit;
                line-height: inherit;
                margin: 0;
            }

            input, textarea { max-width: 100%; width: auto; }

            button {
                overflow: visible;
                font-feature-settings: inherit;
                font-variation-settings: inherit;
                letter-spacing: inherit;
                border-radius: 0;
                background-color: transparent;
                opacity: 1;
            }

            button, select { text-transform: none; }

            select {
                box-sizing: border-box;
                border-top: #0069a8 solid 2px;
                background-color: white;
                width: 100%;
                padding: 5%;
                cursor: pointer;
                text-wrap: wrap;
            }

            .select { height: 6rem; font-size: 1.7rem; height: 75px; }

            select:focus { border-color: #0069a8; outline: none; }

            label { display: inline-block; margin-bottom: 5px; font-weight: bold; }

            .hide, .hide_form, .hidden { display: none !important; }

            #form {
                position: absolute;
                z-index: 200;
                background-color: white;
                padding: 7%;
                width: 400px;
                left: -45%;
                bottom: -1px;
                box-shadow: 0 0 10px rgba(0,0,0,0.3);
                border-radius: 1.6%;
                font-size: 2rem;
            }

            #container {
                display: flex;
                flex-direction: column;
                column-gap: 2%;
                row-gap: 4%;
                text-align: center;
                align-items: center;
                justify-content: flex-start;
                max-width: 1280px;
                min-height: 2000px;
                padding: 10rem;
                margin: 0 auto;
            }

            #configurator {
                display: flex;
                flex-wrap: wrap;
                column-gap: 4rem;
                row-gap: 2rem;
                justify-content: flex-start;
                align-items: center;
                padding: 0px;
                margin-top: 2.4rem;
            }

            #errors { padding: 1rem 2rem 1rem 3rem; display: flex; flex-direction: column; }

            #reset_button, #quote_button { color: white; font-weight: bold; font-size: 2rem; height: 8rem; }

            #reset_button { padding: 2rem; background-color: #a41719; width: 40%; margin: 0px; }
            #reset_button:hover { background-color: #a11619; }

            #quote_button { text-align: center; background-color: #006bb7; width: 100%; cursor: pointer; }
            #quote_button:hover { background-color: #124fd3; }

            #button_holder {
                display: flex;
                flex-direction: column;
                overflow: visible;
                position: relative;
                width: 100%;
                height: 100%;
                font-size: 2rem;
            }

            #title { font-size: 4rem; font-weight: bolder; color: #0069a8; }

            #part_number { display: flex; flex-direction: row; }

            #button_label { display: none; position: absolute; bottom: 100%; }

            #inner {
                display: grid;
                grid-template-columns: 57% auto;
                grid-template-rows: auto 10%;
                row-gap: 4%;
            }

            #col1_row1 { grid-column: 1 / span 1; grid-row: 1 / span 1; display: flex; font-size: 1.9rem; flex-direction: column; }
            #col1_row2 { grid-column: 1 / span 1; grid-row: 2 / span 1; height: 100%; display: flex; align-items: start; overflow: hidden; }
            #col2_row1 { grid-column: 2 / span 1; grid-row: 1 / span 1; display: flex; align-items: flex-start; justify-content: flex-start; flex-direction: column; font-size: 1.7rem; }

            #col2_row1_inner {
                margin-top: 5%;
                padding: 3rem;
                display: flex;
                align-items: flex-start;
                justify-content: flex-start;
                flex-direction: column;
                color: black;
                text-align: left;
                box-shadow: 0 0 10px rgba(0,0,0,0.3);
                width: 100%;
            }

            .selections_div { margin-top: 2rem; transition: all 0.5s ease-in; width: 100%; }

            #col2_row2 { grid-column: 2 / span 1; grid-row: 2 / span 1; display: flex; flex-direction: column; align-items: stretch; }

            .element_div {
                display: flex;
                flex-direction: column;
                width: 25rem;
                flex-wrap: wrap;
                background-color: white;
                font-weight: bold;
                box-shadow: 0 0 10px rgba(0,0,0,0.3);
                padding-left: 3rem;
                padding-right: 3rem;
                font-size: 1.6rem;
            }

            .section_title { padding: 1rem; }

            .header_div { flex: 0 1 auto; text-align: left; letter-spacing: 0.2rem; padding-top: 1%; }
            .spacer_div { padding-right: 10%; flex: 1 1 30rem; }
            .spacer_div_left { display: none; }

            .addon_pnum { font-size: 1.5rem; color: rgb(51, 51, 51); }

            .selections_div .close_annun { min-height: 32rem; }
            .selections_div .open_annun { min-height: 40rem; }

            .selection_options {
                display: flex;
                flex-direction: column;
                position: relative;
                overflow: hidden;
                border-top: none;
                width: 100%;
                color: rgb(51, 51, 51);
                gap: 0.5rem;
                font-size: 1.3rem;
                min-height: 29rem;
            }

            .selection_header {
                cursor: pointer;
                font-weight: bold;
                color: rgb(51, 51, 51);
                border-bottom: solid rgb(0, 105, 168) 2px;
                display: flex;
                margin-bottom: 1rem;
            }

            .selection_text { flex: 1; }
            .selection_row { display: flex; }
            .section_name { flex: 1; }
            .section_selected { flex: 1; }

            .annun_div { font-size: 1.3rem; color: rgb(51, 51, 51); }

            #price_label, #part_label, #lead_label { margin-bottom: 0px; }
            #price_label, #lead_label { margin-top: 5px; }

            #part_b_notice { margin: 1rem; color: #0069a8; }

            @media (max-width:1199px) { html { font-size: 56.25%; } }
            @media (max-width:991px)  { html { font-size: 50%; } }
            @media (max-width:767px)  { html { font-size: 43.75%; } }
            @media (min-width:992px)  { .footer_top { height: 60px; } }

            @media only screen and (max-width: 1220px) { .spacer_div { padding-right: 15%; } }
            @media only screen and (max-width: 1102px) { .spacer_div { flex: 1 1 25rem; } }
            @media only screen and (max-width: 1079px) { .element_div { width: 23rem; } .spacer_div { flex: 1 1 24rem; } }
            @media only screen and (max-width: 1025px) { #inner { grid-template-columns: 55% auto; } .element_div { width: 21rem; } .spacer_div { flex: 1 1 21rem; } }
            @media only screen and (max-width: 1024px) { .spacer_div { flex: 1 1 20rem; } }
            @media only screen and (max-width: 991px)  { .element_div { width: 25rem; } }
            @media only screen and (max-width: 985px)  { .spacer_div { flex: 1 1 20rem; } }

            @media only screen and (max-width: 959px) {
                #container { min-height: 2350px; }
                #inner { display: grid; grid-template-columns: auto; grid-template-rows: repeat(4, auto); row-gap: 4%; }
                #col1_row1 { grid-column: 1 / span 1; grid-row: 1 / span 1; }
                #col1_row2 { grid-column: 1 / span 1; grid-row: 2 / span 1; overflow: visible; justify-content: center; }
                #col2_row1 { grid-column: 1 / span 1; grid-row: 3 / span 1; }
                #col2_row2 { grid-column: 1 / span 1; grid-row: 4 / span 1; height: 60px; }
                #configurator { justify-content: center; }
                .element_div { width: 40rem; }
                .spacer_div_left { display: inline; flex: 1 1 15rem; padding-left: 5%; }
                .header_div { flex: 1 1 30rem; text-align: center; padding: 0%; }
                .spacer_div { flex: 1 1 15rem; padding-right: 5%; }
                #reset_button { width: 85%; }
                #form { left: 0px; width: 400px; }
            }

            @media only screen and (max-width: 831px) { .element_div { width: 35rem; } }
            @media only screen and (max-width: 658px) { #container { padding: 6rem 4rem 4rem 4rem; } }
            @media only screen and (max-width: 594px) { .spacer_div_left { flex: 1 1 5rem; } .spacer_div { flex: 1 1 5rem; } }
            @media only screen and (max-width: 573px) { .element_div { width: 33rem; } }
            @media only screen and (max-width: 545px) { .element_div { width: 30rem; } }
            @media only screen and (max-width: 503px) { .element_div { width: 26rem; } }

            @media only screen and (max-width: 454px) {
                #container { min-height: 2800px; }
                .element_div { width: 55rem; }
                #form { width: 350px; left: -5%; }
            }

            @media only screen and (max-width: 434px) { .element_div { width: 50rem; } }

            @media only screen and (max-width: 400px) {
                .spacer_div, .spacer_div_left { display: none; }
                .element_div { width: 40rem; }
                #form { width: 250px; left: -8%; }
            }

                        Y: { text: 'Y', desc: SELECT_H, c_type: { 6: { val: SELECT_H, price: ZERO_PRICE }, 7: { val: SELECT_H, price: ZERO_PRICE } } },
                    }
                },
                [SELECT_I]: {
                    bucket: 'G5',
                    options: {
                        0: { text: '0', desc: NONE,     c_type: { 6: { val: NONE,     price: ZERO_PRICE }, 7: { val: NONE,     price: ZERO_PRICE } } },
                        R: { text: 'R', desc: SELECT_I, c_type: { 6: { val: SELECT_I, price: ZERO_PRICE }, 7: { val: SELECT_I, price: ZERO_PRICE } } },
                    }
                },
                [SELECT_J]: {
                    bucket: 'G6',
                    options: {
                        0: { text: '0', desc: NONE,              c_type: { 6: { val: NONE,              price: ZERO_PRICE }, 7: { val: NONE,              price: ZERO_PRICE } } },
                        A: { text: 'A', desc: 'Element J Type 1', c_type: { 6: { val: 'Element J Type 1', price: ZERO_PRICE }, 7: { val: 'Element J Type 1', price: ZERO_PRICE } } },
                        H: { text: 'H', desc: 'Element J Type 2', c_type: { 6: { val: 'Element J Type 2', price: ZERO_PRICE }, 7: { val: 'Element J Type 2', price: ZERO_PRICE } } },
                        S: { text: 'S', desc: 'Element J Type 3', c_type: { 6: { val: 'Element J Type 3', price: ZERO_PRICE }, 7: { val: 'Element J Type 3', price: ZERO_PRICE } } },
                    }
                },
                'Section 3': { bucket: 'header' },
                [SELECT_K]: {
                    bucket: 'H',
                    options: {
                        0: { text: '0', val: '0', desc: 'None',                            price: ZERO_PRICE },
                        H: { text: 'H', val: 'H', desc: 'One Element K per Element A',     price: 125.00 }, // Price updated 01/25/26
                    }
                },
                [SELECT_L]: {
                    bucket: 'I',
                    options: {
                        0: { text: '0', val: '0', desc: 'None',           price: ZERO_PRICE },
                        D: { text: 'D', val: 'D', desc: 'Element L Type 1', price: ZERO_PRICE },
                        R: { text: 'R', val: 'R', desc: 'Element L Type 2', price: ZERO_PRICE },
                    }
                },
            };

            const TOWER_PRICES = {
                A: {
                    base: 38.47,
                    6: { type_A1: 42.36, type_A2: 44.49, type_A3: 44.49, type_4: 50.66 },
                    7: { type_A1: 40.01, type_A2: 42.36, type_A3: 42.36, type_4: 48.35 },
                },
                B: {
                    base: ZERO_PRICE,
                    6: { type_B1: 420.00, type_B2: 485.00, type_4: 168.00 },
                    7: { type_B1: 420.00, type_B2: 485.00, type_4: 168.00 },
                },
                C: {
                    base: ZERO_PRICE,
                    6: { type_C1: 532.65, type_4: 165.44 },
                    7: { type_C1: 532.65, type_4: 204.78 },
                },
            };

            const COMPONENT_PRICES = {
                component_01: 14.22 + 2.72,                        // button + label
                component_02: 15.47 + 1.81 + 6.10 + 2.72,         // din mount + contact clip + button head + label
                component_03: 6.31,
                component_04: 14.00,
                component_05: 0.48,
                component_06: 0.63 + 5.30 + 1.09,                  // fuse + holder + endcap
                component_07: 34.00,
                component_a:  0.36,
                component_09: 0.24,
                component_10: 2.24,
                component_11: 0.25,                                 // per in
                component_12: 0.54,                                 // per ft
                labor:        40.00,                                // per hr
            };

            // Families that are NOT in SPECIAL_SELECT_A and not 'V'
            const REG_METERS = Object.keys(ELEMENTS[SELECT_A].options)
                .filter(k => !SPECIAL_SELECT_A.includes(k) && k !== 'V');

            const ERROR_MESSAGES = {
                wrong_c_7:                  `Element A ${['Q', 'R', 'S'].map(c => ELEMENTS[SELECT_A].options[c].text).join(', ')} require Element C Type 7!`,
                wrong_c_6:                  `Element A ${['X', 'Y', 'Z'].map(c => ELEMENTS[SELECT_A].options[c].text).join(', ')} require Element C Type 6!`,
                no_e:                       'Must not select None for Element E if selecting Elements F, G, H, I or J!',
                no_f:                       'Must not select None for Element F if selecting Elements G, H, or I!',
                no_ghi:                     'Must select at least one Element G, H, or I not selecting None for Element F!',
                not_type1:                  'Must select a Type 1 Element E if selecting G for Element F!',
                no_e_components:            'Must select at least one Element G, H, I, or J if not selecting None for Element E!',
                wrong_amount_special_element_a: `Must select 1 or 2 Element A if selecting 2 Element E and Element A ${SPECIAL_SELECT_A.map(c => ELEMENTS[SELECT_A].options[c].text).join(', ')}!`,
                wrong_amount_element_a:     `Must select 2 Element A if selecting 2 Element E and Element A ${REG_METERS.map(c => ELEMENTS[SELECT_A].options[c].text).join(', ')}!`,
                two_element_e_v:            `May not select more than one Element E if selecting ${ELEMENTS[SELECT_A].options['V'].text}!`,
                fix_errors:                 'Resolve errors above and create a valid part number before requesting a quote.',
                valid_part:                 'Valid part number',
            };

            //============ DOM REFS ============//
            const PART_NUM_CONTAINER   = document.querySelector('#part_number');
            const PRICE_CONTAINER      = document.querySelector('#price');
            const LEAD_TIME_CONTAINER  = document.querySelector('#lead_time');
            const ERROR_CONTAINER      = document.querySelector('#errors');
            const PART_NUMBER_ON_ERROR = document.querySelector('#pNum_err');
            const SELECTIONS_CONTAINER = document.querySelector('.selections_div');
            const CONFIGURATOR_CONTAINER = document.querySelector('#configurator');
            const FORM_CONTAINER       = document.querySelector('#form');
            const QUOTE_BUTTON         = document.querySelector('#quote_button');
            const QUOTE_LABEL          = document.querySelector('#button_label');
            const RESET_BUTTON         = document.querySelector('#reset_button');
            const PART_B_NOTICE        = document.querySelector('#part_b_notice');
            const ELEMENT_M_CONTAINER  = document.createElement('div');

            const PART_CHARS = [];

            //============ STATE ============//
            function getDefaultSelections() {
                return {
                    [SELECT_A]: 'A',
                    [SELECT_B]: '1',
                    [SELECT_C]: '6',
                    [SELECT_D]: 'A',
                    [SELECT_E]: '0',
                    [SELECT_F]: '0',
                    [SELECT_G]: '0',
                    [SELECT_H]: '0',
                    [SELECT_I]: '0',
                    [SELECT_J]: '0',
                    [SELECT_K]: '0',
                    [SELECT_L]: '0',
                };
            }

            let selected_options = getDefaultSelections();

            //============ DERIVED STATE ============//

            /** Returns a snapshot of all commonly-derived values, computed once per update cycle. */
            function getComputedState() {
                const a = selected_options[SELECT_A];
                const b = selected_options[SELECT_B];
                const c = selected_options[SELECT_C];
                const d = selected_options[SELECT_D];
                const e = selected_options[SELECT_E];
                const f = selected_options[SELECT_F];
                const g = selected_options[SELECT_G];
                const h = selected_options[SELECT_H];
                const i = selected_options[SELECT_I];
                const j = selected_options[SELECT_J];
                const k = selected_options[SELECT_K];
                const l = selected_options[SELECT_L];

                // When Element A is 'V', treat Element B count as 1
                const effectiveB = a === 'V' ? '1' : b;

                const numESpecialComponents = countNonZero([g, h, i]);
                const numEAllComponents     = countNonZero([g, h, i, j]);

                const [numM, typeM] = deriveElementM(a, b, e, numESpecialComponents);

                const numComponent04 = deriveNumComponent04(effectiveB);
                const numComponent11 = deriveNumComponent11(effectiveB);

                const numComponentA  = a === 'V'
                    ? ELEMENTS[SELECT_B].options[b].val
                    : 15 * Number(effectiveB);

                const numComponent12 = (500 + (350 * (Number(effectiveB) - 1))) / 12;
                const numHours       = 4 + (2 * (Number(effectiveB) - 1));

                return { a, b, c, d, e, f, g, h, i, j, k, l,
                         effectiveB, numESpecialComponents, numEAllComponents,
                         numM, typeM, numComponent04, numComponent11,
                         numComponentA, numComponent12, numHours };
            }

            /** Count how many values in an array are not '0'. */
            function countNonZero(values) {
                return values.filter(v => v !== '0').length;
            }

            /** Whether an Element E value represents a "doubled" quantity. */
            function isDoubled(eVal) {
                return Number(eVal) % 2 === 0;
            }

            function deriveElementM(a, b, e, numESpecialComponents) {
                let num = 0, type = 'T';

                if (b === '2' && e === '1' && numESpecialComponents !== 0) {
                    num  = numESpecialComponents === 1 ? 1 : 2;
                    type = 'T';
                } else if (b === '3' || b === '4') {
                    num  = 2;
                    type = SPECIAL_SELECT_A.includes(a) ? 'U' : 'T';
                } else if (b === '5' || b === '6') {
                    num  = 2;
                    type = 'U';
                } else if (['T', 'U', 'V'].includes(a) || b === '1' || b === '2') {
                    num  = 0;
                    type = 'T';
                }

                return [num, type];
            }

            function deriveNumComponent04(effectiveB) {
                switch (effectiveB) {
                    case '1': case '2': return 1;
                    case '3': case '4': return 2;
                    case '5': case '6': return 4;
                    default: console.error('ERR in deriveNumComponent04'); return 0;
                }
            }

            function deriveNumComponent11(effectiveB) {
                switch (effectiveB) {
                    case '1':                          return 0;
                    case '2': case '3': case '4':      return 30;
                    case '5': case '6':                return 42;
                    default: console.error('ERR in deriveNumComponent11'); return 0;
                }
            }

            //============ DISPLAY VALUE HELPERS ============//

            function getDisplayVal(key, optionKey, c) {
                return VOLTAGE_ELEMENT_KEYS.includes(key)
                    ? ELEMENTS[key].options[optionKey].c_type[c].val
                    : ELEMENTS[key].options[optionKey].desc;
            }

            function formatPrice(n) {
                const [whole, cents] = n.toFixed(2).split('.');
                return '$' + whole.replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '.' + cents;
            }

            function titleCase(str) {
                return str.toLowerCase().split(' ')
                    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                    .join(' ');
            }

            function toId(name) {
                return name.replaceAll(' ', '_');
            }

            //============ PRICE CALCULATIONS ============//

            function getPriceElementE(state) {
                const { e, g, h, i, j, c, numESpecialComponents } = state;
                const eNum = Number(e);
                if (eNum === 0) return 0.00;

                let e_price = 0.00;
                let towerData;

                if (eNum <= 2) {
                    towerData = TOWER_PRICES.A;
                    const opts = towerData[c];
                    if (g !== '0') e_price += opts.type_A1;
                    if (h !== '0') e_price += opts.type_A2;
                    if (i !== '0') e_price += opts.type_A3;
                } else if (eNum <= 4) {
                    towerData = TOWER_PRICES.B;
                    const opts = towerData[c];
                    if (numESpecialComponents > 0) {
                        e_price += numESpecialComponents > 1 ? opts.type_B1 : opts.type_B2;
                    }
                } else {
                    towerData = TOWER_PRICES.C;
                    const opts = towerData[c];
                    if (numESpecialComponents > 0) e_price += opts.type_C1;
                }

                if (j === 'A' || j === 'H') e_price += towerData[c].type_4;

                e_price += towerData.base;
                if (isDoubled(e)) e_price *= 2;

                return e_price;
            }

            function getPriceElementL(state) {
                const { l, e, numEAllComponents } = state;
                switch (l) {
                    case '0': return 0.00;
                    case 'D': return COMPONENT_PRICES.component_01;
                    case 'R': {
                        const effectiveComponents = numEAllComponents === 0 ? 4 : numEAllComponents;
                        const numE = isDoubled(e) ? 2 : 1;
                        return COMPONENT_PRICES.component_02
                             + effectiveComponents * numE * COMPONENT_PRICES.component_03;
                    }
                    default: return 0.00;
                }
            }

            function getPriceCompany(state) {
                const { a, c, effectiveB, d, k, numM, typeM, numComponent04 } = state;

                const price_a = ELEMENTS[SELECT_A].options[a].c_type[c].price;
                const price_d = ELEMENTS[SELECT_D].options[d].nelementA[effectiveB].price;
                const price_m = ELEMENTS[SELECT_A].options[typeM].c_type[c].price;
                const price_k = ELEMENTS[SELECT_K].options[k].price;

                return (price_a * Number(effectiveB))
                     + price_d
                     + (price_m * numM)
                     + (price_k * Number(effectiveB))
                     + (COMPONENT_PRICES.component_04 * numComponent04);
            }

            function getPriceThirdParty(state) {
                const { j, numComponent04, numComponent11, numComponentA, numComponent12 } = state;
                const num_component_01 = ['H', 'S'].includes(j) ? 1 : 0;

                return COMPONENT_PRICES.component_06
                     + COMPONENT_PRICES.component_10
                     + COMPONENT_PRICES.component_07
                     + getPriceElementE(state)
                     + getPriceElementL(state)
                     + (COMPONENT_PRICES.component_05 * numComponent04 * 2)
                     + (COMPONENT_PRICES.component_09 * numComponent04)
                     + (COMPONENT_PRICES.component_a  * numComponentA)
                     + (COMPONENT_PRICES.component_12 * numComponent12)
                     + (COMPONENT_PRICES.component_11 * numComponent11)
                     + (COMPONENT_PRICES.component_01 * num_component_01);
            }

            function getLaborPrice(state) {
                return COMPONENT_PRICES.labor * state.numHours;
            }

            //============ VALIDATION ============//

            function validatePart(state) {
                const { a, b, c, e, f, numESpecialComponents, numEAllComponents } = state;
                const errors = [];

                if (['Q', 'R', 'S'].includes(a) && c !== '7') errors.push(ERROR_MESSAGES.wrong_c_7);
                if (['X', 'Y', 'Z'].includes(a) && c !== '6') errors.push(ERROR_MESSAGES.wrong_c_6);

                if (e === '0' && !(f === '0' && numEAllComponents === 0)) errors.push(ERROR_MESSAGES.no_e);
                if (e !== '0' && numEAllComponents === 0)                  errors.push(ERROR_MESSAGES.no_e_components);
                if (f === '0' && numESpecialComponents !== 0)              errors.push(ERROR_MESSAGES.no_f);
                if (f !== '0' && numESpecialComponents === 0)              errors.push(ERROR_MESSAGES.no_ghi);
                if (f === 'G' && !['1', '2'].includes(e))                  errors.push(ERROR_MESSAGES.not_type1);

                if (e === '2') {
                    if (SPECIAL_SELECT_A.includes(a) && !['1', '2'].includes(b)) errors.push(ERROR_MESSAGES.wrong_amount_special_element_a);
                    else if (REG_METERS.includes(a) && b !== '2')                errors.push(ERROR_MESSAGES.wrong_amount_element_a);
                    if (a === 'V')                                                errors.push(ERROR_MESSAGES.two_element_e_v);
                }

                // Render validation state
                if (errors.length === 0) {
                    PART_NUM_CONTAINER.style.display    = 'flex';
                    LEAD_TIME_CONTAINER.style.color     = 'initial';
                    PART_NUMBER_ON_ERROR.style.display  = 'none';
                    ERROR_CONTAINER.innerHTML = `<div style="color:green;text-align:left;"><ul><li>${ERROR_MESSAGES.valid_part}</li></ul></div>`;
                } else {
                    PART_NUM_CONTAINER.style.display    = 'none';
                    LEAD_TIME_CONTAINER.style.color     = 'white';
                    PART_NUMBER_ON_ERROR.style.display  = 'flex';
                    ERROR_CONTAINER.innerHTML = errors
                        .map(err => `<div style="color:red;text-align:left;"><ul><li>${err}</li></ul></div>`)
                        .join('');
                }

                return errors;
            }

            //============ UPDATE FUNCTIONS ============//

            function updateAll() {
                const state  = getComputedState();
                const errors = validatePart(state);

                updatePrice(state);
                updatePartNumber();
                updateSelected(state);
                setElementM(state, errors);
            }

            function updatePrice(state) {
                const total = (getPriceCompany(state)    * MULTIPLIERS.company)
                            + (getPriceThirdParty(state) * MULTIPLIERS.third_party)
                            + (getLaborPrice(state)      * MULTIPLIERS.labor)
                            + PREMIUM_ADDER;
                PRICE_CONTAINER.textContent = formatPrice(total);
            }

            function updatePartNumber() {
                Object.entries(selected_options).forEach(([key, value]) => {
                    const idx = BUCKET_INDEX[ELEMENTS[key].bucket];
                    if (idx === undefined) return;
                    PART_CHARS[idx].textContent = DASH_INDICES.has(idx) ? '-' + value : value;
                });
            }

            function updateSelected(state) {
                const { c } = state;
                Object.keys(selected_options).forEach(key => {
                    if (ELEMENTS[key].bucket === 'header') return;
                    const el = document.querySelector('#' + toId(key));
                    if (el) el.textContent = getDisplayVal(key, selected_options[key], c);
                });
            }

            function setElementM(state, errors) {
                const { numM, typeM } = state;
                const visible = numM !== 0 && errors.length === 0;

                ELEMENT_M_CONTAINER.style.display = visible ? 'initial' : 'none';
                SELECTIONS_CONTAINER.classList.toggle('open_annun',  visible);
                SELECTIONS_CONTAINER.classList.toggle('close_annun', !visible);

                if (visible) {
                    ELEMENT_M_CONTAINER.textContent =
                        `* Includes ${numM === 1 ? 'one' : 'two'} ${ELEMENTS[SELECT_A].options[typeM].text} Element M`;
                }
            }

            //============ ELEMENT B OPTION SWAPPING ============//

            function updateNumberOfElementAOptions(newElementA) {
                const selectEl   = document.getElementById(`select_${toId(SELECT_B)}`);
                const sectionEl  = document.getElementById(`sectionname_${toId(SELECT_B)}`);
                const titleEl    = document.getElementById(`title_${toId(SELECT_B)}`);
                const compLabel  = 'Number of Component A';

                if (!selectEl) { console.error(`No element: select_${toId(SELECT_B)}`); return; }

                selectEl.innerHTML = '';

                const allKeys   = Object.keys(ELEMENTS[SELECT_B].options);
                const isV       = newElementA === 'V';
                const keys      = isV ? allKeys.filter(k => isNaN(k)) : allKeys.filter(k => !isNaN(k));
                const label     = isV ? compLabel : SELECT_B;

                sectionEl.textContent = label;
                titleEl.textContent   = label;
                isV ? PART_B_NOTICE.classList.remove('hide') : PART_B_NOTICE.classList.add('hide');

                keys.forEach((key, index) => {
                    const opt  = ELEMENTS[SELECT_B].options[key];
                    const text = opt.text === opt.desc ? opt.text : `${opt.text} — ${opt.desc}`;
                    const el   = document.createElement('option');
                    el.value       = key;
                    el.textContent = text;
                    if (index === 0) { el.selected = true; selected_options[SELECT_B] = key; }
                    selectEl.appendChild(el);
                });
            }

            //============ UI BUILDING ============//

            function partNumSetup() {
                for (let i = 0; i < 14; i++) {
                    const div = document.createElement('div');
                    if (i === 0) div.textContent = 'PDEA-';
                    if (i === 3) div.textContent = 'PVA';
                    PART_CHARS.push(div);
                    PART_NUM_CONTAINER.appendChild(div);
                }
            }

            function buildConfigurator() {
                Object.entries(ELEMENTS).forEach(([name, data]) => {
                    if (data.bucket === 'header') {
                        const left   = document.createElement('div');
                        const header = document.createElement('div');
                        const right  = document.createElement('div');

                        left.classList.add('spacer_div_left');
                        header.classList.add('header_div');
                        right.classList.add('spacer_div');

                        header.textContent = name.toUpperCase();
                        left.innerHTML = right.innerHTML = '<hr>';

                        [left, header, right].forEach(el => CONFIGURATOR_CONTAINER.appendChild(el));
                        return;
                    }

                    let keys = Object.keys(data.options);
                    if (name === SELECT_B) keys = keys.filter(k => !isNaN(k));

                    const wrapper = document.createElement('div');
                    const title   = document.createElement('div');
                    const select  = document.createElement('select');

                    wrapper.classList.add('element_div');
                    title.classList.add('section_title');
                    select.classList.add('select');

                    title.id  = `title_${toId(name)}`;
                    select.id = `select_${toId(name)}`;
                    title.textContent = name.replace('and', '&');

                    keys.forEach((key, index) => {
                        const opt  = data.options[key];
                        const text = opt.text === opt.desc ? opt.text : `${opt.text} — ${opt.desc}`;
                        const el   = document.createElement('option');
                        el.value       = key;
                        el.textContent = text;
                        if (index === 0) {
                            el.selected = true;
                            selected_options[name] = key;
                            updatePartNumber();
                        }
                        select.appendChild(el);
                    });

                    select.addEventListener('change', e => {
                        if (name === SELECT_A) {
                            const prev = selected_options[name];
                            const next = e.target.value;
                            if (prev === 'V' || next === 'V') updateNumberOfElementAOptions(next);
                        }
                        selected_options[name] = e.target.value;
                        updateAll();
                    });

                    wrapper.appendChild(title);
                    wrapper.appendChild(select);
                    CONFIGURATOR_CONTAINER.appendChild(wrapper);
                });
            }

            function buildSelectionsContainer() {
                const header  = document.createElement('div');
                const text    = document.createElement('div');
                const options = document.createElement('div');

                ELEMENT_M_CONTAINER.classList.add('annun_div');
                header.classList.add('selection_header');
                text.classList.add('selection_text');
                options.classList.add('selection_options');

                text.textContent = 'Current Selections';
                header.appendChild(text);

                const c = selected_options[SELECT_C];
                Object.entries(selected_options).forEach(([name, val]) => {
                    if (ELEMENTS[name].bucket === 'header') return;

                    const row       = document.createElement('div');
                    const nameEl    = document.createElement('div');
                    const selectEl  = document.createElement('div');

                    row.classList.add('selection_row');
                    nameEl.classList.add('section_name');
                    selectEl.classList.add('section_selected');

                    nameEl.id   = `sectionname_${toId(name)}`;
                    selectEl.id = toId(name);

                    nameEl.textContent   = name.replace('and', '&') + ':';
                    selectEl.textContent = getDisplayVal(name, val, c);

                    row.appendChild(nameEl);
                    row.appendChild(selectEl);
                    options.appendChild(row);
                });

                SELECTIONS_CONTAINER.appendChild(header);
                SELECTIONS_CONTAINER.appendChild(options);
                SELECTIONS_CONTAINER.appendChild(ELEMENT_M_CONTAINER);
            }

            function buildForm() {
                const fields = ['name', 'company', 'title', 'email', 'phone', 'part', 'quantity', 'price', 'lead'];
                const readonlyFields = new Set(['part', 'price', 'lead']);
                const labelOverrides = { part: 'Part', price: 'Price', lead: 'Lead Time' };

                fields.forEach(field => {
                    const wrapper = document.createElement('div');
                    const label   = document.createElement('label');

                    wrapper.id         = `form_${field}`;
                    wrapper.style.cssText = 'width: 100%;';
                    label.htmlFor      = field;
                    label.style.cssText = 'display:flex;flex-direction:row;font-weight:bold;width:100%';

                    const labelText = labelOverrides[field] ?? titleCase(field);
                    label.innerHTML = readonlyFields.has(field)
                        ? labelText
                        : `${labelText}<p style="color:red">*</p>`;

                    const input = document.createElement(field === 'part' ? 'textarea' : 'input');
                    input.id   = 'id_' + field;
                    input.name = field;
                    input.style.cssText = 'border:gray solid 2px;border-radius:0.5rem;width:100%';

                    if (field !== 'part') {
                        input.type = field === 'email' ? 'email' : field === 'phone' ? 'tel' : 'text';
                    }

                    if (readonlyFields.has(field)) {
                        input.setAttribute('readonly', true);
                    } else {
                        input.setAttribute('required', true);
                    }

                    wrapper.appendChild(label);
                    wrapper.appendChild(input);
                    FORM_CONTAINER.appendChild(wrapper);
                });

                // Buttons row
                const btnRow   = document.createElement('div');
                const submit   = document.createElement('input');
                const cancel   = document.createElement('button');

                btnRow.style.cssText = 'display:flex;flex-direction:row;gap:1rem;margin-top:2rem;width:100%;justify-content:center';
                submit.id    = 'submit';
                submit.type  = 'submit';
                submit.value = 'Submit';
                submit.style.cssText = 'text-align:center;color:white;font-weight:bold;background-color:#0069a8;width:12rem;height:4rem;cursor:pointer;border-radius:10px';

                cancel.id          = 'cancel';
                cancel.textContent = 'Cancel';
                cancel.style.cssText = 'text-align:center;color:black;font-weight:bold;background-color:gray;width:12rem;height:4rem;cursor:pointer;border-radius:10px';
                cancel.addEventListener('click', e => { e.preventDefault(); FORM_CONTAINER.classList.add('hide_form'); });

                btnRow.appendChild(submit);
                btnRow.appendChild(cancel);
                FORM_CONTAINER.appendChild(btnRow);

                // Close form when clicking outside
                document.addEventListener('click', e => {
                    const inForm   = FORM_CONTAINER.contains(e.target);
                    const inButton = QUOTE_BUTTON.contains(e.target);
                    if (!inButton)           QUOTE_LABEL.style.display = 'none';
                    if (!inButton && !inForm) FORM_CONTAINER.classList.add('hide_form');
                });
            }

            function setResetButton() {
                RESET_BUTTON.addEventListener('click', () => {
                    CONFIGURATOR_CONTAINER.querySelectorAll('select')
                        .forEach(s => { s.selectedIndex = 0; });

                    selected_options = getDefaultSelections();
                    document.querySelector('.selection_options')?.classList.remove('open');
                    SELECTIONS_CONTAINER.classList.remove('open');

                    updateNumberOfElementAOptions('A');
                    updateAll();
                });
            }

            function setQuoteButton() {
                QUOTE_BUTTON.addEventListener('click', () => {
                    const state  = getComputedState();
                    const errors = validatePart(state);

                    if (errors.length === 0) {
                        QUOTE_LABEL.style.display = 'none';
                        FORM_CONTAINER.classList.remove('hide_form');
                    } else {
                        QUOTE_LABEL.style.display = 'flex';
                    }

                    document.querySelector('#form #id_part').value  = PART_CHARS.map(p => p.innerHTML).filter(Boolean).join('');
                    document.querySelector('#form #id_price').value = PRICE_CONTAINER.textContent;
                    document.querySelector('#form #id_lead').value  = LEAD_TIME_CONTAINER.textContent;
                });
            }

            //============ INIT ============//
            partNumSetup();
            buildConfigurator();
            buildSelectionsContainer();
            setResetButton();
            setQuoteButton();
            buildForm();
            updateAll();
        </script>
    </body>
</html>
